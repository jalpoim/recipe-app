<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Salmon background matching nav icon series -->
  <rect width="200" height="200" rx="44" fill="#FAD4C6"/>

  <!-- Calendar card -->
  <rect x="28" y="52" width="144" height="116" rx="14" fill="white" stroke="#2D2D2D" stroke-width="5"/>

  <!-- Coral header -->
  <path d="M28 66 Q28 52 42 52 H158 Q172 52 172 66 V88 H28 Z" fill="#F4623A"/>

  <!-- Binding rings -->
  <rect x="62" y="40" width="11" height="24" rx="5.5" fill="#2D2D2D"/>
  <rect x="95" y="40" width="11" height="24" rx="5.5" fill="#2D2D2D"/>
  <rect x="127" y="40" width="11" height="24" rx="5.5" fill="#2D2D2D"/>

  <!-- Day circles row 1 -->
  <!-- checked -->
  <circle cx="54"  cy="114" r="14" fill="#FEF2EF" stroke="#F4623A" stroke-width="3.5"/>
  <polyline points="46,114 52,120 62,108" stroke="#F4623A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- checked -->
  <circle cx="100" cy="114" r="14" fill="#FEF2EF" stroke="#F4623A" stroke-width="3.5"/>
  <polyline points="92,114 98,120 108,108" stroke="#F4623A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- unchecked -->
  <circle cx="146" cy="114" r="14" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3.5"/>

  <!-- Day circles row 2 -->
  <!-- checked -->
  <circle cx="54"  cy="148" r="14" fill="#FEF2EF" stroke="#F4623A" stroke-width="3.5"/>
  <polyline points="46,148 52,154 62,142" stroke="#F4623A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- unchecked -->
  <circle cx="100" cy="148" r="14" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3.5"/>
  <!-- unchecked -->
  <circle cx="146" cy="148" r="14" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3.5"/>
</svg>
